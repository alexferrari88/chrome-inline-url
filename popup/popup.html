<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inline Link Displayer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="logo-area">
        <svg class="logo" viewBox="0 0 128 128" width="24" height="24">
          <circle cx="64" cy="64" r="58" fill="url(#logoGrad)" />
          <g fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" transform="translate(18, 22)">
            <path d="M38 46H26C15 46 6 37 6 26C6 15 15 6 26 6H38" />
            <path d="M54 26H66C77 26 86 35 86 46C86 57 77 66 66 66H54" />
            <line x1="32" y1="36" x2="60" y2="36" />
          </g>
          <defs>
            <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" stop-color="#8B5CF6" />
              <stop offset="100%" stop-color="#3B82F6" />
            </linearGradient>
          </defs>
        </svg>
        <h1>Inline Links</h1>
      </div>
      <span class="badge active-badge" id="activeTabStatus">Current Tab</span>
    </header>

    <!-- Active Tab Quick Whitelist Banner -->
    <div class="current-site-banner" id="currentSiteBanner">
      <div class="site-info">
        <span class="site-label">Active Site</span>
        <span class="site-domain" id="currentDomain">Loading...</span>
      </div>
      <button class="btn btn-primary" id="btnQuickWhitelist">Whitelist Site</button>
    </div>

    <!-- Whitelist Section -->
    <main class="main-content">
      <div class="section-title">
        <h2>Whitelisted Sites</h2>
        <span class="count-badge" id="whitelistCount">0</span>
      </div>

      <div class="list-container" id="whitelistItemsList">
        <!-- Template / Dynamic items will be inserted here -->
        <div class="empty-state" id="emptyState">
          <svg viewBox="0 0 24 24" width="40" height="40" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
          <p>No whitelisted sites added yet.</p>
        </div>
      </div>
    </main>

    <!-- Add Custom Site Form -->
    <section class="add-section">
      <div class="form-toggle-header" id="toggleAddForm">
        <span>Add Website Manually</span>
        <svg class="chevron-icon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 9l-7 7-7-7" />
        </svg>
      </div>

      <form class="add-form hidden" id="addSiteForm">
        <div class="form-group">
          <label for="inputDomain">Domain / Hostname</label>
          <input type="text" id="inputDomain" placeholder="e.g. news.ycombinator.com" required>
        </div>
        <div class="form-group">
          <label for="inputSelector">CSS Selector (Optional)</label>
          <input type="text" id="inputSelector" placeholder="e.g. td.title, .article-body">
          <span class="input-help">If empty, all links on the page will show inline.</span>
        </div>
        <div class="error-msg id-error hidden" id="formError">Error message</div>
        <button type="submit" class="btn btn-secondary">Add to Whitelist</button>
      </form>
    </section>

    <!-- Footer -->
    <footer class="footer">
      <div class="shortcut-tip">
        <span>Shortcut: </span>
        <kbd id="shortcutKey">Alt+Shift+U</kbd>
        <span> to toggle display on current page</span>
      </div>
    </footer>
  </div>

  <!-- Template for Whitelist Item Card (hidden) -->
  <template id="whitelistItemTemplate">
    <div class="whitelist-card">
      <div class="card-header">
        <div class="card-title-group">
          <span class="card-domain">domain.com</span>
        </div>
        <div class="card-actions">
          <label class="switch-toggle">
            <input type="checkbox" class="site-enable-toggle" checked>
            <span class="slider"></span>
          </label>
          <button class="btn-icon btn-delete" title="Delete whitelist item">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div class="selector-input-wrapper">
          <span class="selector-label">Selector:</span>
          <input type="text" class="card-selector-input" placeholder="All links (no selector)">
          <button class="btn-icon btn-save-selector" title="Save CSS Selector" disabled>
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M5 13l4 4L19 7" />
            </svg>
          </button>
        </div>
      </div>
    </div>
  </template>

  <script src="popup.js"></script>
</body>
</html>
